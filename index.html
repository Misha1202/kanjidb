<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Задачник - Совместное выполнение задач</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 650px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .app-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 { font-size: 28px; margin-bottom: 8px; }
        .header p { opacity: 0.9; font-size: 14px; }
        .tabs {
            display: flex;
            background: #f5f5f5;
            border-bottom: 1px solid #e0e0e0;
        }
        .tab-btn {
            flex: 1;
            padding: 15px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s;
            color: #666;
        }
        .tab-btn.active {
            background: white;
            color: #667eea;
            border-bottom: 3px solid #667eea;
        }
        .content { padding: 30px; }
        .card { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .hidden { display: none; }
        .form-group { margin-bottom: 20px; }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: border-color 0.3s;
            font-family: inherit;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        textarea { resize: vertical; min-height: 80px; }
        .main-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .main-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .main-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .secondary-btn {
            background: linear-gradient(135deg, #6c757d 0%, #495057 100%);
            margin-top: 10px;
        }
        .task-img {
            max-width: 100%;
            margin: 15px 0;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
            font-style: italic;
        }
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-right: 8px;
        }
        .badge-high { background: #fee; color: #c00; }
        .badge-medium { background: #ffeaa7; color: #d63031; }
        .badge-low { background: #e8f5e9; color: #27ae60; }
        .info-box {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
        }
        hr { margin: 20px 0; border: none; border-top: 2px solid #f0f0f0; }
        .success-msg {
            background: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        .error-msg {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <h1>📋 Совместный задачник</h1>
            <p>Создавай задачи и помогай другим их выполнять!</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('create')">➕ Создать задачу</button>
            <button class="tab-btn" onclick="switchTab('solve')">🎯 Выполнить задачу</button>
        </div>

        <div class="content">
            <div id="successMsg" class="success-msg"></div>
            <div id="errorMsg" class="error-msg"></div>

            <div id="create-screen" class="card">
                <form id="task-form">
                    <div class="form-group">
                        <label>📌 Название задачи *</label>
                        <input type="text" id="task-title" required placeholder="Например: Починить кран на кухне">
                    </div>
                    <div class="form-group">
                        <label>🏷️ Категория</label>
                        <select id="task-category">
                            <option value="Дом">🏠 Дом</option>
                            <option value="Работа">💼 Работа</option>
                            <option value="Спорт">🏃‍♂️ Спорт</option>
                            <option value="Учеба">📚 Учеба</option>
                            <option value="Другое">✨ Другое</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>⚡ Приоритет</label>
                        <select id="task-priority">
                            <option value="Низкий">🟢 Низкий</option>
                            <option value="Средний" selected>🟡 Средний</option>
                            <option value="Высокий">🔴 Высокий</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>📝 Описание задачи</label>
                        <textarea id="task-desc" rows="3" placeholder="Что нужно сделать? Какие есть нюансы?"></textarea>
                    </div>
                    <div class="form-group">
                        <label>📸 Фото «ДО» (необязательно)</label>
                        <input type="file" id="task-file-before" accept="image/*">
                    </div>
                    <button type="submit" class="main-btn">✨ Сохранить задачу</button>
                </form>
            </div>

            <div id="solve-screen" class="card hidden">
                <div id="screen-msg" class="loading">
                    🎲 Нажмите кнопку, чтобы получить случайную задачу
                </div>
                
                <div id="task-container" class="hidden">
                    <h3 id="view-title" style="color: #667eea; margin-bottom: 15px;"></h3>
                    
                    <div class="info-box">
                        <p><strong>🏷️ Категория:</strong> <span id="view-category"></span></p>
                        <p><strong>⚡ Приоритет:</strong> <span id="view-priority"></span></p>
                        <p><strong>📝 Описание:</strong> <span id="view-desc"></span></p>
                    </div>
                    
                    <div id="view-img-before-container"></div>
                    
                    <hr>
                    
                    <div class="form-group">
                        <label style="color: #e74c3c;">📸 Фотоотчет «ПОСЛЕ» *</label>
                        <input type="file" id="task-file-after" accept="image/*">
                        <small style="color: #666;">Обязательно прикрепите фото выполненной работы</small>
                    </div>
                    
                    <button class="main-btn" onclick="completeTask()">✅ Отправить отчет</button>
                </div>
                
                <button class="main-btn secondary-btn" onclick="getRandomTask()">
                    🎲 Получить случайную задачу
                </button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://zukiqrltjqsaeetxmnez.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_sbsCtuNxNmC2u-nAsNaDmQ_bBXDfr5f";
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let currentTask = null;

        function showMessage(message, isError = false) {
            const msgDiv = isError ? document.getElementById('errorMsg') : document.getElementById('successMsg');
            msgDiv.textContent = message;
            msgDiv.style.display = 'block';
            setTimeout(() => {
                msgDiv.style.display = 'none';
            }, 3000);
        }

        window.switchTab = function(screenId) {
            document.getElementById('create-screen').classList.add('hidden');
            document.getElementById('solve-screen').classList.add('hidden');
            
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            
            if (screenId === 'create') {
                document.getElementById('create-screen').classList.remove('hidden');
                document.querySelector('.tab-btn:first-child').classList.add('active');
            } else {
                document.getElementById('solve-screen').classList.remove('hidden');
                document.querySelector('.tab-btn:last-child').classList.add('active');
            }
        }

        async function uploadImage(fileInputId) {
            const fileInput = document.getElementById(fileInputId);
            if (!fileInput.files || fileInput.files.length === 0) return null;
            
            const file = fileInput.files[0];
            
            if (file.size > 5 * 1024 * 1024) {
                showMessage('Файл слишком большой! Максимум 5MB', true);
                return null;
            }
            
            const fileExt = file.name.split('.').pop();
            const fileName = `${Date.now()}-${Math.random().toString(36).substring(7)}.${fileExt}`;
            const filePath = `task-photos/${fileName}`;

            try {
                // Пробуем загрузить в bucket 'task-images'
                const { data, error } = await supabaseClient.storage
                    .from('task-images')
                    .upload(filePath, file, {
                        cacheControl: '3600',
                        upsert: false
                    });

                if (error) {
                    console.error('Ошибка загрузки:', error);
                    showMessage('Ошибка загрузки фото: ' + error.message, true);
                    return null;
                }

                const { data: publicUrlData } = supabaseClient.storage
                    .from('task-images')
                    .getPublicUrl(filePath);
                    
                return publicUrlData.publicUrl;
            } catch (err) {
                console.error('Исключение при загрузке:', err);
                showMessage('Ошибка при загрузке файла', true);
                return null;
            }
        }

        document.getElementById('task-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = this.querySelector('button[type="submit"]');
            const originalText = btn.textContent;
            btn.textContent = "⏳ Сохранение...";
            btn.disabled = true;

            try {
                const photoBeforeUrl = await uploadImage('task-file-before');

                const { error } = await supabaseClient
                    .from('tasks')
                    .insert([{
                        title: document.getElementById('task-title').value,
                        category: document.getElementById('task-category').value,
                        priority: document.getElementById('task-priority').value,
                        description: document.getElementById('task-desc').value || 'Нет описания',
                        photo_before_url: photoBeforeUrl,
                        status: 'Доступна'
                    }]);

                if (error) throw error;
                
                showMessage('✅ Задача успешно создана!');
                this.reset();
                
            } catch (error) {
                showMessage('❌ Ошибка: ' + error.message, true);
                console.error('Ошибка:', error);
            } finally {
                btn.textContent = originalText;
                btn.disabled = false;
            }
        });

        window.getRandomTask = async function() {
            const container = document.getElementById('task-container');
            const msg = document.getElementById('screen-msg');
            
            container.classList.add('hidden');
            msg.classList.remove('hidden');
            msg.textContent = "🔄 Загрузка задач из базы данных...";
            
            document.getElementById('task-file-after').value = ""; 

            try {
                const { data: availableTasks, error } = await supabaseClient
                    .from('tasks')
                    .select('*')
                    .eq('status', 'Доступна')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                if (!availableTasks || availableTasks.length === 0) {
                    msg.innerHTML = "🎉 Поздравляем! Все задачи выполнены! 🎉<br><small>Загляните позже или создайте новую задачу</small>";
                    return;
                }

                const randomIndex = Math.floor(Math.random() * availableTasks.length);
                currentTask = availableTasks[randomIndex];

                msg.classList.add('hidden');
                container.classList.remove('hidden');

                document.getElementById('view-title').innerText = currentTask.title;
                document.getElementById('view-category').innerHTML = getCategoryIcon(currentTask.category);
                document.getElementById('view-priority').innerHTML = getPriorityBadge(currentTask.priority);
                document.getElementById('view-desc').innerText = currentTask.description || 'Без описания';

                const imgContainer = document.getElementById('view-img-before-container');
                imgContainer.innerHTML = '';
                if (currentTask.photo_before_url) {
                    imgContainer.innerHTML = `
                        <label style="font-weight: 600; margin-top: 10px; display: block;">📸 Фото ДО:</label>
                        <img src="${currentTask.photo_before_url}" class="task-img" alt="Фото до выполнения">
                    `;
                }
            } catch (error) {
                msg.textContent = "❌ Ошибка загрузки: " + error.message;
                console.error(error);
            }
        }

        function getCategoryIcon(category) {
            const icons = {
                'Дом': '🏠 Дом',
                'Работа': '💼 Работа',
                'Спорт': '🏃‍♂️ Спорт',
                'Учеба': '📚 Учеба',
                'Другое': '✨ Другое'
            };
            return icons[category] || '✨ ' + category;
        }

        function getPriorityBadge(priority) {
            const badges = {
                'Высокий': '<span class="badge badge-high">🔴 Высокий</span>',
                'Средний': '<span class="badge badge-medium">🟡 Средний</span>',
                'Низкий': '<span class="badge badge-low">🟢 Низкий</span>'
            };
            return badges[priority] || priority;
        }

        window.completeTask = async function() {
            if (!currentTask) {
                showMessage('Сначала выберите задачу!', true);
                return;
            }

            const fileInput = document.getElementById('task-file-after');
            if (!fileInput.files || fileInput.files.length === 0) {
                showMessage('📸 Пожалуйста, сделайте фотоотчет «ПОСЛЕ» выполнения!', true);
                return;
            }

            const btn = document.querySelector('button[onclick="completeTask()"]');
            const originalText = btn.textContent;
            btn.textContent = "⏳ Отправка отчета...";
            btn.disabled = true;

            try {
                const photoAfterUrl = await uploadImage('task-file-after');

                if (!photoAfterUrl) {
                    throw new Error('Не удалось загрузить фото');
                }

                const { error } = await supabaseClient
                    .from('tasks')
                    .update({ 
                        status: 'Выполнена', 
                        photo_after_url: photoAfterUrl
                    })
                    .eq('id', currentTask.id);

                if (error) throw error;

                showMessage('🎉 Отлично! Задача выполнена! Спасибо за помощь!');
                currentTask = null;
                
                setTimeout(() => {
                    getRandomTask();
                }, 1500);
                
            } catch (error) {
                showMessage('❌ Ошибка: ' + error.message, true);
                btn.textContent = originalText;
                btn.disabled = false;
            }
        }

        window.addEventListener('load', async () => {
            try {
                // Проверяем подключение
                const { error } = await supabaseClient.from('tasks').select('id', { count: 'exact', head: true });
                if (error) throw error;
                console.log('✅ Supabase подключен успешно!');
                showMessage('✅ Подключение к базе данных установлено!');
            } catch (error) {
                console.error('❌ Ошибка подключения к Supabase:', error);
                showMessage('⚠️ Не удалось подключиться к базе данных. Проверьте настройки Supabase.', true);
            }
        });
    </script>
</body>
</html>
