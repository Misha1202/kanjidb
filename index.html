<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Система задач - Мезонин</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
        }

        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .content {
            padding: 30px;
        }

        .role-btn {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .role-btn:hover {
            border-color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.2);
        }

        .user-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
        }

        .admin-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
        }

        .user-btn:hover, .admin-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
        }

        .input-group {
            margin-top: 20px;
            display: none;
        }

        .input-group.show {
            display: block;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 15px;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1>📋 Мезонин Задачник</h1>
                <p>Учет задач по полкам, коробкам и беспорядку</p>
            </div>
            <div class="content">
                <button class="role-btn user-btn" onclick="showUserAuth()">
                    👤 Я сотрудник
                </button>
                <button class="role-btn admin-btn" onclick="showAdminAuth()">
                    👑 Администратор
                </button>
                
                <div id="userAuth" class="input-group">
                    <input type="text" id="userName" placeholder="Введите ваше ФИО или ID сотрудника">
                    <button onclick="loginAsUser()">Войти в систему</button>
                </div>
                
                <div id="adminAuth" class="input-group">
                    <input type="password" id="adminPassword" placeholder="Введите пароль администратора">
                    <button onclick="loginAsAdmin()">Войти как администратор</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const ADMIN_PASSWORD = "admin123"; // Смените на свой пароль!

        function showUserAuth() {
            document.getElementById('userAuth').classList.add('show');
            document.getElementById('adminAuth').classList.remove('show');
        }

        function showAdminAuth() {
            document.getElementById('adminAuth').classList.add('show');
            document.getElementById('userAuth').classList.remove('show');
        }

        function loginAsUser() {
            const userName = document.getElementById('userName').value.trim();
            if (!userName) {
                alert('Введите ваше ФИО или ID');
                return;
            }
            localStorage.setItem('userId', userName);
            localStorage.setItem('userRole', 'user');
            window.location.href = 'user-dashboard.html';
        }

        function loginAsAdmin() {
            const password = document.getElementById('adminPassword').value;
            if (password === ADMIN_PASSWORD) {
                localStorage.setItem('userRole', 'admin');
                window.location.href = 'admin-panel.html';
            } else {
                alert('Неверный пароль!');
            }
        }

        // Проверка при загрузке, если уже авторизован
        if (localStorage.getItem('userRole') === 'user') {
            window.location.href = 'user-dashboard.html';
        } else if (localStorage.getItem('userRole') === 'admin') {
            window.location.href = 'admin-panel.html';
        }
    </script>
</body>
</html>
